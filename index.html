<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한덕환 - 이제는 좋아하는 것만 일로 하는 사람</title>
    <meta property="og:title" content="한덕환 - 이제는 좋아하는 것만 일로 하는 사람">
    <meta property="og:description" content="한덕환 작가 - 인생 후반전을 설계하는 AI 컨설턴트">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-page: #f0f4f8;
            --surface: #ffffff;
            --primary: #0f4c81;
            --primary-light: #e6f0fa;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            max-width: 480px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card {
            background-color: var(--surface);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }
        .header-section {
            text-align: center;
        }
        .profile-img-wrap {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 16px;
            border: 3px solid var(--primary-light);
            background-color: var(--bg-page);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
        }
        .name {
            font-size: 22px;
            font-weight: 800;
            margin: 0 0 6px;
            color: var(--text-main);
        }
        .title {
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 12px;
        }
        .quote {
            font-size: 13px;
            background-color: var(--primary-light);
            color: var(--primary);
            padding: 8px 14px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .bio {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.6;
            text-align: left;
            margin-bottom: 16px;
        }
        .contact-list {
            list-style: none;
            padding: 12px;
            margin: 0;
            background-color: #f8fafc;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: left;
            font-size: 13px;
        }
        .contact-list li {
            padding: 6px 0;
            color: var(--text-sub);
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed var(--border);
        }
        .contact-list li:last-child {
            border-bottom: none;
        }
        .contact-list strong {
            color: var(--text-main);
        }
        .section-header {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-header::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 16px;
            background-color: var(--primary);
            border-radius: 2px;
        }
        .timeline-box {
            background-color: #f8fafc;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            border-left: 3px solid var(--primary);
        }
        .timeline-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .timeline-desc {
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.5;
        }
        .qr-section {
            text-align: center;
            padding: 20px 24px;
        }
        .qr-box {
            display: inline-block;
            padding: 12px;
            background-color: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-top: 8px;
        }
        /* 요구사항 반영: 눈에 띄지 않는 보통 회색 컬러 적용 */
        .qr-desc {
            font-size: 13px;
            color: var(--text-sub);
            margin-top: 8px;
            font-weight: 600;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-log {
            max-height: 220px;
            overflow-y: auto;
            background-color: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg-ai {
            align-self: flex-start;
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 12px 12px 12px 2px;
            max-width: 85%;
        }
        .msg-user {
            align-self: flex-end;
            background-color: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 12px 12px 2px 12px;
            max-width: 85%;
        }
        .input-group {
            display: flex;
            gap: 8px;
        }
        .input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }
        .input-group button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        .input-group button:disabled {
            background-color: #94a3b8;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            box-sizing: border-box;
        }
        .form-group button {
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="card header-section">
            <div class="profile-img-wrap" id="img-wrap">
                <span style="color:#94a3b8; font-size:12px;">사진 로딩 중...</span>
            </div>
            <div class="name" id="ui-name">한덕환 작가</div>
            <div class="title" id="ui-title">데이터 동기화 중...</div>
            <div class="quote" id="ui-quote">인생의 오후는 좋아하는 일만 하며 살자</div>
            <div class="bio" id="ui-bio"></div>
            
            <ul class="contact-list">
                <li><strong>이메일</strong> <span>hanmokhae@gmail.com</span></li>
                <li><strong>유튜브 채널</strong> <span>@혼자걷다보면</span></li>
                <li><strong>브런치 작가</strong> <span>투빈대디</span></li>
                <li><strong>연락처(HP)</strong> <span id="ui-phone">비공개</span></li>
            </ul>
        </div>

        <div class="card">
            <div class="section-header">경력 및 활동 통찰</div>
            <div class="timeline-box">
                <div class="timeline-label">《이제는.좋아하는 일만 하는 사람》</div>
                <div class="timeline-desc" id="ui-career-post"></div>
            </div>
            <div class="timeline-box">
                <div class="timeline-label">《그전엔.직장인 30년》</div>
                <div class="timeline-desc" id="ui-career-pre"></div>
            </div>
        </div>

        <div class="card qr-section">
            <div class="section-header" style="justify-content: center;">온라인 명함 QR</div>
            <div class="qr-box" id="qrcode"></div>
            <div class="qr-desc" id="qr-desc"></div>
        </div>

        <div class="card">
            <div class="section-header">한덕환 AI와 대화하기</div>
            <div class="chat-container">
                <div class="chat-log" id="chat-log">
                    <div class="msg-ai">반갑습니다. 인생 후반전을 여유롭게 걷고 있는 한덕환입니다. 산책이나 AI 컨설팅, 인생 2막에 대해 편하게 물어보세요.</div>
                </div>
                <div class="input-group">
                    <input type="text" id="ai-input" placeholder="질문을 입력하세요..." onkeypress="if(event.keyCode==13) askAI();">
                    <button id="ai-btn" onclick="askAI()">전송</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-header">방명록 남기기</div>
            <div class="form-group">
                <input type="text" id="gb-author" placeholder="성함 또는 닉네임" required>
                <textarea id="gb-content" rows="3" placeholder="응원이나 메시지를 적어주세요." required></textarea>
                <button id="gb-btn" onclick="submitGuestbook()">방명록 등록</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwnBnMN2I7HNoD_EX2xhlOckZeliRYgNR7TmOtoJrofeJGPWv-civ37vx2qQXJJz9po/exec";

        window.addEventListener('DOMContentLoaded', () => {
            renderQR();
            fetchProfile();
        });

        function renderQR() {
            const urlParams = new URLSearchParams(window.location.search);
            const isModeOpen = urlParams.get('mode') === 'open';
            const baseUrl = window.location.origin + window.location.pathname;
            const targetUrl = isModeOpen ? (baseUrl + "?mode=open") : baseUrl;
            const descEl = document.getElementById('qr-desc');

            if (isModeOpen) {
                descEl.innerText = "";
                descEl.style.display = "none";
            } else {
                descEl.innerText = "연락번호 별도 문의";
                descEl.style.display = "block";
            }

            new QRCode(document.getElementById("qrcode"), {
                text: targetUrl,
                width: 110,
                height: 110,
                colorDark: "#1e293b",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.L
            });
        }

        function fetchProfile() {
            fetch(`${GAS_API_URL}?action=getProfile`)
                .then(res => res.json())
                .then(res => {
                    if (res.status === "success" && res.data) {
                        const d = res.data;
                        if (d["활동명"]) document.getElementById("ui-name").innerText = d["활동명"];
                        if (d["핵심타이틀"]) document.getElementById("ui-title").innerText = d["핵심타이틀"];
                        if (d["생활철학"]) document.getElementById("ui-quote").innerText = d["생활철학"];
                        if (d["소개글"]) document.getElementById("ui-bio").innerText = d["소개글"];
                        
                        if (d["경력_전반전"]) {
                            let preText = String(d["경력_전반전"]).replace("(정보|경영 전략전문)", "").trim();
                            document.getElementById("ui-career-pre").innerText = preText;
                        }
                        if (d["경력_후반전"]) {
                            let postText = String(d["경력_후반전"])
                                .replace("서울대표 인플루언서", "서울 인플루언서 100인")
                                .replace("인생2막 전문강사", "인생2막삶설계 전문강사");
                            document.getElementById("ui-career-post").innerText = postText;
                        }
                        
                        let rawImg = d["프로필사진URL"] || d["프로필사진"] || d["사진"] || "";
                        if (typeof rawImg === "object") {
                            rawImg = rawImg.url || rawImg.src || JSON.stringify(rawImg);
                            if (rawImg === "{}" || rawImg.includes("object Object")) rawImg = "";
                        }
                        rawImg = String(rawImg).trim();
                        
                        if (rawImg !== "" && rawImg !== "{}") {
                            const driveMatch = rawImg.match(/\/(?:file\/d\/|open\?id=)([\w-]+)/);
                            if (driveMatch && driveMatch[1]) {
                                rawImg = `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w400`;
                            }
                            document.getElementById("img-wrap").innerHTML = `<img src="${rawImg}" alt="Profile" onerror="this.parentElement.innerHTML='<span style=\\'color:#94a3b8;font-size:12px;\\'>이미지 로드 실패</span>'">`;
                        } else {
                            document.getElementById("img-wrap").innerHTML = `<span style="color:#94a3b8;font-size:12px;">사진 URL 시트 입력 필요</span>`;
                        }
                        
                        const urlParams = new URLSearchParams(window.location.search);
                        const phoneEl = document.getElementById('ui-phone');
                        if (urlParams.get('mode') === 'open') {
                            const phoneVal = d["연락처"] ? String(d["연락처"]).trim() : "010-3280-4309";
                            phoneEl.innerText = phoneVal;
                            phoneEl.style.color = "#0f4c81";
                            phoneEl.style.fontWeight = "800";
                        } else {
                            phoneEl.innerText = "비공개";
                            phoneEl.style.color = "#64748b";
                            phoneEl.style.fontWeight = "normal";
                        }
                    }
                })
                .catch(err => console.log("프로필 동기화 실패:", err));
        }

        function askAI() {
            const inputEl = document.getElementById("ai-input");
            const btnEl = document.getElementById("ai-btn");
            const logEl = document.getElementById("chat-log");
            const msg = inputEl.value.trim();
            if (!msg) return;

            logEl.innerHTML += `<div class="msg-user">${msg}</div>`;
            inputEl.value = "";
            logEl.scrollTop = logEl.scrollHeight;
            btnEl.disabled = true;
            btnEl.innerText = "...";

            fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "chatPersona", message: msg })
            })
            .then(res => res.json())
            .then(data => {
                const reply = (data.status === "success") ? data.reply : "오류가 발생했습니다.";
                logEl.innerHTML += `<div class="msg-ai">${reply}</div>`;
            })
            .catch(() => {
                logEl.innerHTML += `<div class="msg-ai" style="color:red;">통신 실패</div>`;
            })
            .finally(() => {
                btnEl.disabled = false;
                btnEl.innerText = "전송";
                logEl.scrollTop = logEl.scrollHeight;
            });
        }

        function submitGuestbook() {
            const authorEl = document.getElementById("gb-author");
            const contentEl = document.getElementById("gb-content");
            const btnEl = document.getElementById("gb-btn");
            if (!authorEl.value.trim() || !contentEl.value.trim()) return;

            btnEl.disabled = true;
            btnEl.innerText = "등록 중...";

            fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: "addGuestbook", author: authorEl.value.trim(), content: contentEl.value.trim() })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    authorEl.value = "";
                    contentEl.value = "";
                }
            })
            .finally(() => {
                btnEl.disabled = false;
                btnEl.innerText = "방명록 등록";
            });
        }
    </script>
</body>
</html>
